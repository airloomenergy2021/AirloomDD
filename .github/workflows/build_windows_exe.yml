name: Build Windows Application

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib dpkt openpyxl pyinstaller
        
    - name: Build Executable with PyInstaller
      run: |
        pyinstaller AirloomTelemetry.spec --noconfirm
        
    - name: Zip Windows Application Folder
      run: |
        powershell Compress-Archive -Path dist/AirloomTelemetry -DestinationPath dist/AirloomTelemetry-Windows-Fast-Launch.zip
        
    - name: Upload Windows Executable
      uses: actions/upload-artifact@v4
      with:
        name: AirloomTelemetry-Windows-Standalone
        path: dist/AirloomTelemetry-Windows-Fast-Launch.zip
