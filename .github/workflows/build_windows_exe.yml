name: Build Windows Application

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib dpkt openpyxl pyinstaller
        
    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --onefile --windowed --add-data "ICD_Formats;ICD_Formats" --name "AirloomTelemetry" gui_telemetry.py
        
    - name: Upload Windows Executable
      uses: actions/upload-artifact@v4
      with:
        name: AirloomTelemetry-Windows-Executable
        path: dist/AirloomTelemetry.exe
